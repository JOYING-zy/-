<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>认知灵活性任务（Switch Cost）</title>

<style>
body {
  font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
#cue {
  font-size: 26px;
  line-height: 1.6;
  margin-bottom: 30px;
}
#stimulus {
  width: 140px;
  height: 140px;
  margin: 20px auto;
}
.circle { border-radius: 50%; }
.square { border-radius: 16px; }
.red { background: #e74c3c; }
.blue { background: #3498db; }
</style>
</head>

<body>

<div id="cue"></div>
<div id="stimulus"></div>

<script>

/************ 基本参数 ************/
const pid = "P_" + Date.now() + "_" + Math.floor(Math.random()*1000);

const PRACTICE = 8;
const TEST = 32;
const LEFT = "f";
const RIGHT = "j";

/************ 状态变量 ************/
let trials = [];
let current = -1;
let lastRule = null;
let startTime = 0;
let started = false;

/************ 数据统计 ************/
let testTrials = [];
let correctCount = 0;
let totalTest = 0;
let switchRTs = [];
let repeatRTs = [];

/************ 生成规则 ************/
function generateRules(n){
  let rules = [];
  let rule = Math.random() < 0.5 ? "color" : "shape";

  for(let i=0;i<n;i++){
    if(Math.random() >= 0.5){
      rule = rule === "color" ? "shape" : "color";
    }
    rules.push(rule);
  }
  return rules;
}

/************ 生成 trial ************/
function makeTrial(rule){
  const color = Math.random() < 0.5 ? "red" : "blue";
  const shape = Math.random() < 0.5 ? "circle" : "square";

  const correctKey =
    rule === "color"
      ? (color === "red" ? LEFT : RIGHT)
      : (shape === "circle" ? LEFT : RIGHT);

  return {rule, color, shape, correctKey};
}

/************ 初始化 ************/
generateRules(PRACTICE + TEST).forEach(r => trials.push(makeTrial(r)));

document.getElementById("cue").innerHTML =
  "<strong>认知任务说明</strong><br><br>" +
  "颜色判断：红色 (F) ｜ 蓝色 (J)<br>" +
  "形状判断：圆形 (F) ｜ 方形 (J)<br><br>" +
  "请又快又准作答<br><br><strong>按 F 或 J 开始</strong>";

/************ 键盘监听 ************/
document.addEventListener("keydown", function(e){

  if(!started){
    if(e.key === LEFT || e.key === RIGHT){
      started = true;
      nextTrial();
    }
    return;
  }

  if(e.key !== LEFT && e.key !== RIGHT) return;
  if(current < 0 || current >= trials.length) return;

  const rt = Math.round(performance.now() - startTime);
  const t = trials[current];

  const trialType =
    lastRule === null ? "start" :
    lastRule === t.rule ? "repeat" : "switch";

  const correct = e.key === t.correctKey;

  /************ 只记录正式实验 ************/
  if(current >= PRACTICE){

    totalTest++;

    if(correct) correctCount++;

    if(correct){ 
      if(trialType === "switch"){
        switchRTs.push(rt);
      }
      if(trialType === "repeat"){
        repeatRTs.push(rt);
      }
    }

  }

  lastRule = t.rule;

  nextTrial();
});

/************ 下一题 ************/
function nextTrial(){

  current++;

  if(current >= trials.length){
    endTask();
    return;
  }

  const t = trials[current];
  const phase = current < PRACTICE ? "练习" : "正式";

  document.getElementById("cue").innerText =
    `【${phase}】判断${t.rule==="color"?"颜色":"形状"}：` +
    (t.rule==="color"?"红(F)/蓝(J)":"圆(F)/方(J)");

  const stim = document.getElementById("stimulus");
  stim.className = t.color + " " + t.shape;

  startTime = performance.now();
}

/************ 平均值函数 ************/
function mean(arr){
  if(arr.length === 0) return 0;
  return Math.round(arr.reduce((a,b)=>a+b)/arr.length);
}

/************ 结束 ************/
function endTask(){

  document.getElementById("stimulus").innerHTML = "";

  const accuracy = Math.round(correctCount / totalTest * 100);

  const switchRT = mean(switchRTs);
  const repeatRT = mean(repeatRTs);
  const switchCost = switchRT - repeatRT;

  document.getElementById("cue").innerHTML =
"任务结束，请复制下面这一行并返回问卷：<br><br>" +

"<div style='font-size:24px;font-weight:bold;color:#c0392b'>" +
pid + "," + accuracy + "," + switchRT + "," + repeatRT + "," + switchCost +
"</div>";
    "请一定复制以上数据并返回问卷填写";
}

</script>

</body>
</html>
