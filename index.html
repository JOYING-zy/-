<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>认知灵活性任务（Switch Cost）</title>

<style>
body {
  font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
#cue {
  font-size: 26px;
  line-height: 1.6;
  margin-bottom: 30px;
}
#stimulus {
  width: 140px;
  height: 140px;
  margin: 20px auto;
}
.circle { border-radius: 50%; }
.square { border-radius: 16px; }
.red { background: #e74c3c; }
.blue { background: #3498db; }
</style>
</head>

<body>

<div id="cue"></div>
<div id="stimulus"></div>

<script>
/************ 被试编号 ************/
const pid = "P_" + Date.now() + "_" + Math.floor(Math.random()*1000);

/************ 参数 ************/
const PRACTICE = 8;
const TEST = 32;
const LEFT = "f";
const RIGHT = "j";

/************ 变量 ************/
let trials = [];
let current = -1;
let lastRule = null;
let startTime = 0;
let data = [];

/************ 生成规则 ************/
function generateRules(n){
  let rules = [];
  let rule = Math.random() < 0.5 ? "color" : "shape";
  for(let i=0;i<n;i++){
    if(Math.random() >= 0.5){
      rule = rule === "color" ? "shape" : "color";
    }
    rules.push(rule);
  }
  return rules;
}

/************ 生成 trial ************/
function makeTrial(rule){
  const color = Math.random() < 0.5 ? "red" : "blue";
  const shape = Math.random() < 0.5 ? "circle" : "square";
  const correctKey =
    rule === "color"
      ? (color === "red" ? LEFT : RIGHT)
      : (shape === "circle" ? LEFT : RIGHT);
  return {rule, color, shape, correctKey};
}

/************ 初始化 ************/
generateRules(PRACTICE + TEST).forEach(r => trials.push(makeTrial(r)));

document.getElementById("cue").innerHTML =
  "<strong>认知任务说明</strong><br><br>" +
  "颜色判断：红色 (F) ｜ 蓝色 (J)<br>" +
  "形状判断：圆形 (F) ｜ 方形 (J)<br><br>" +
  "请又快又准作答<br>按任意键开始";

document.addEventListener("keydown", startTask, { once:true });

function startTask(){ nextTrial(); }

/************ 主流程 ************/
function nextTrial(){
  current++;
  if(current >= trials.length){
    endTask();
    return;
  }
  const t = trials[current];
  const phase = current < PRACTICE ? "练习" : "正式";
  document.getElementById("cue").innerText =
    `【${phase}】判断${t.rule==="color"?"颜色":"形状"}：` +
    (t.rule==="color"?"红(F)/蓝(J)":"圆(F)/方(J)");
  const stim = document.getElementById("stimulus");
  stim.className = t.color + " " + t.shape;
  startTime = performance.now();
}

document.addEventListener("keydown", function(e){
  if(current<0 || current>=trials.length) return;
  if(e.key!==LEFT && e.key!==RIGHT) return;
  const rt = Math.round(performance.now() - startTime);
  const t = trials[current];
  const trialType =
    lastRule===null ? "start" :
    lastRule===t.rule ? "repeat" : "switch";
  data.push({
    trial: current+1,
    phase: current<PRACTICE?"practice":"test",
    rule: t.rule,
    trial_type: trialType,
    rt: rt,
    correct: e.key===t.correctKey
  });
  lastRule = t.rule;
  nextTrial();
});

/************ 结束 & 上传 ************/
function endTask(){
  document.getElementById("stimulus").innerHTML = "";
  uploadData();
}

function uploadData(){
  const payload = encodeURIComponent(JSON.stringify(data.map(d => ({
    pid: pid,
    trial: d.trial,
    phase: d.phase,
    rule: d.rule,
    trial_type: d.trial_type,
    rt: d.rt,
    correct: d.correct
  }))));

  const img = new Image();
  img.src =
    "https://script.google.com/macros/s/AKfycbw9o_kGSqXs0Sksdir9ClLglG3b0dkDjHwwbeQRWskX21PZdyshuu9fVLA4bYUqZnd0/exec"
    + "?data=" + payload;

  document.getElementById("cue").innerHTML =
    "<strong>任务结束，感谢参与！</strong><br><br>请关闭页面";
}
</script>

</body>
</html>
