<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>认知灵活性任务（Switch Cost）</title>

<style>
body {
  font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 提示语 */
#cue {
  font-size: 26px;          /* 原来 22 → 放大两号 */
  line-height: 1.6;
  margin-bottom: 30px;
}

/* 刺激呈现 */
#stimulus {
  width: 140px;
  height: 140px;
  margin: 20px auto;
}

.circle {
  border-radius: 50%;
}
.square {
  border-radius: 16px;
}
.red {
  background: #e74c3c;
}
.blue {
  background: #3498db;
}

button {
  margin-top: 40px;
  padding: 14px 28px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="cue"></div>
<div id="stimulus"></div>

<script>
const pid = "P_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
/**************** 参数（最终版：8 + 32） ****************/
const PRACTICE = 8;
const TEST = 32;
const LEFT = "f";
const RIGHT = "j";

/**************** 变量 ****************/
let trials = [];
let current = -1;
let lastRule = null;
let startTime = 0;
let data = [];

/**************** 生成规则序列（保证 repeat + switch） ****************/
function generateRules(n){
  let rules = [];
  let currentRule = Math.random() < 0.5 ? "color" : "shape";

  for(let i = 0; i < n; i++){
    if(Math.random() < 0.5){
      // repeat
    } else {
      currentRule = currentRule === "color" ? "shape" : "color";
    }
    rules.push(currentRule);
  }
  return rules;
}

/**************** 生成 trial ****************/
function makeTrial(rule){
  const color = Math.random() < 0.5 ? "red" : "blue";
  const shape = Math.random() < 0.5 ? "circle" : "square";
  let correctKey;

  if(rule === "color"){
    correctKey = color === "red" ? LEFT : RIGHT;
  } else {
    correctKey = shape === "circle" ? LEFT : RIGHT;
  }

  return {rule, color, shape, correctKey};
}

/**************** 生成全部 trials ****************/
const rules = generateRules(PRACTICE + TEST);
rules.forEach(r => trials.push(makeTrial(r)));

/**************** 开始界面 ****************/
document.getElementById("cue").innerHTML =
  "<strong>认知任务说明</strong><br><br>" +
  "颜色判断：红色 (F) ｜ 蓝色 (J)<br>" +
  "形状判断：圆形 (F) ｜ 方形 (J)<br><br>" +
  "请又快又准作答<br>" +
  "按任意键开始";

document.addEventListener("keydown", startTask, { once: true });

/**************** 主任务 ****************/
function startTask(){
  nextTrial();
}

function nextTrial(){
  current++;

  if(current >= trials.length){
    endTask();
    return;
  }

  const t = trials[current];
  const phase = current < PRACTICE ? "练习" : "正式";

  document.getElementById("cue").innerText =
    `【${phase}】判断${t.rule === "color" ? "颜色" : "形状"}：` +
    (t.rule === "color" ? "红(F) / 蓝(J)" : "圆(F) / 方(J)");

  const stim = document.getElementById("stimulus");
  stim.className = "";
  stim.classList.add(t.color, t.shape);

  startTime = performance.now();
}

/**************** 反应记录 ****************/
document.addEventListener("keydown", function(e){
  if(current < 0 || current >= trials.length) return;
  if(e.key !== LEFT && e.key !== RIGHT) return;

  const rt = Math.round(performance.now() - startTime);
  const t = trials[current];
  const correct = e.key === t.correctKey;

  const trialType =
    lastRule === null ? "start" :
    lastRule === t.rule ? "repeat" : "switch";

  data.push({
    trial: current + 1,
    phase: current < PRACTICE ? "practice" : "test",
    rule: t.rule,
    trial_type: trialType,
    rt: rt,
    correct: correct
  });

  lastRule = t.rule;
  nextTrial();
});

/**************** 结束与自动下载 ****************/
function endTask(){
  document.getElementById("cue").innerHTML =
    "<strong>任务结束，感谢参与！</strong><br><br>数据将自动下载";

  document.getElementById("stimulus").innerHTML = "";

function uploadData(){
  const payload = encodeURIComponent(JSON.stringify(
    data.map(d => ({
      pid: pid,
      trial: d.trial,
      phase: d.phase,
      rule: d.rule,
      trial_type: d.trial_type,
      rt: d.rt,
      correct: d.correct
    }))
  ));

  const img = new Image();
  img.src = "https://script.google.com/macros/s/AKfycbw9o_kGSqXs0Sksdir9ClLglG3b0dkDjHwwbeQRWskX21PZdyshuu9fVLA4bYUqZnd0/exec"
            + "?data=" + payload;

  document.getElementById("cue").innerHTML =
    "<strong>任务结束，感谢参与！</strong><br><br>请关闭页面";
}

function downloadData(){
  let csv = "trial,phase,rule,trial_type,rt,correct\n";
  data.forEach(d=>{
    csv += `${d.trial},${d.phase},${d.rule},${d.trial_type},${d.rt},${d.correct}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "switch_cost_data.csv";
  a.click();
}
  
  function uploadData(){
  const payload = data.map(d => ({
    pid: pid,
    trial: d.trial,
    phase: d.phase,
    rule: d.rule,
    trial_type: d.trial_type,
    rt: d.rt,
    correct: d.correct
  }));

  fetch("https://script.google.com/macros/s/AKfycbzD7zPJ50draG2hLEImTCh1b859gmhI2YJ4w0V5nT5NHaoUkbvJCNs3C229JxYiEDo/exec", {
    method: "POST",
    body: JSON.stringify(payload),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(res => res.json())
  .then(res => {
    document.getElementById("cue").innerHTML += "<br><br>✅ 数据已成功上传";
  })
  .catch(err => {
    document.getElementById("cue").innerHTML += "<br><br>❌ 数据上传失败";
  });
}
</script>

</body>
</html>
